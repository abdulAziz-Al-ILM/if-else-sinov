<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>ILM ZAMIN | 3D Model Skaneri</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { background: #0f172a; color: #10b981; font-family: monospace; padding: 30px; }
        .container { max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 250px; background: #1e293b; color: #f59e0b; border: 2px solid #10b981; padding: 15px; font-size: 14px; border-radius: 8px; }
        model-viewer { width: 300px; height: 300px; background: #334155; margin-top: 20px; border-radius: 8px; display: none; }
        input[type="file"] { background: #1e293b; color: white; padding: 10px; border: 1px solid #10b981; margin-bottom: 20px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛠 ILM MIZAN: 3D Model Parametrlarini Skanerlash</h2>
        <p>1. O'zingizdagi <b>crosswalk.glb, robot.glb, traffic_light.glb</b> fayllarini baravariga tanlang.</p>
        
        <input type="file" id="fileInput" accept=".glb" multiple>
        
        <p>2. Pastdagi natijani to'liq nusxalab, menga yuboring:</p>
        <textarea id="resultBox">Natija bu yerda chiqadi...</textarea>
        
        <model-viewer id="viewer" alt="Scanner"></model-viewer>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const viewer = document.getElementById('viewer');
        const resultBox = document.getElementById('resultBox');
        let results = [];

        fileInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (files.length === 0) return;
            
            resultBox.value = "Skanerlanmoqda... Iltimos kuting...\n";
            results = [];
            viewer.style.display = 'block';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const url = URL.createObjectURL(file);
                
                await new Promise((resolve) => {
                    viewer.src = url;
                    viewer.addEventListener('load', () => {
                        const dim = viewer.getDimensions();
                        const center = viewer.getBoundingBoxCenter();
                        
                        results.push(`--- Model: ${file.name} ---`);
                        results.push(`O'lchamlari (Kenglik/Balandlik/Chuqurlik): X:${dim.x.toFixed(3)}, Y:${dim.y.toFixed(3)}, Z:${dim.z.toFixed(3)}`);
                        results.push(`Markaziy nuqtasi (Center): X:${center.x.toFixed(3)}, Y:${center.y.toFixed(3)}, Z:${center.z.toFixed(3)}`);
                        results.push(`Asl nisbati (Aspect Ratio): ${(dim.x / dim.y).toFixed(2)}`);
                        results.push(``);
                        
                        resolve();
                    }, { once: true });
                });
            }
            
            viewer.style.display = 'none';
            resultBox.value = results.join('\n');
            resultBox.value += "✅ BARCHA MODELLAR SKANERLANDI. SHU MATNNI NUSXALAB MENGA TASHLANG.";
        });
    </script>
</body>
</html>
